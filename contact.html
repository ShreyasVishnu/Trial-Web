<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Shreyas Bishnu">
    <title>Contact — Shreyas Bishnu</title>
    <script>try{var t=localStorage.getItem('theme');if(t==='light'){document.documentElement.setAttribute('data-theme','light');}}catch(e){}</script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="index.html" class="nav__logo" aria-label="Shreyas Bishnu — Home">
                <span class="nav__logo-mark" aria-hidden="true">SB</span>
            </a>
            <ul class="nav__links">
                <li><a class="nav__link" href="index.html">Home</a></li>
                <li><a class="nav__link" href="about.html">About</a></li>
                <li><a class="nav__link" href="extracurriculars.html">Extracurriculars</a></li>
                <li><a class="nav__link nav__link--active" href="contact.html">Contact</a></li>
                <li class="nav__divider" aria-hidden="true"></li>
                <li>
                    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
                            <circle cx="12" cy="12" r="4"/>
                            <line x1="12" y1="2" x2="12" y2="5"/>
                            <line x1="12" y1="19" x2="12" y2="22"/>
                            <line x1="2" y1="12" x2="5" y2="12"/>
                            <line x1="19" y1="12" x2="22" y2="12"/>
                            <line x1="4.93" y1="4.93" x2="7.05" y2="7.05"/>
                            <line x1="16.95" y1="16.95" x2="19.07" y2="19.07"/>
                            <line x1="4.93" y1="19.07" x2="7.05" y2="16.95"/>
                            <line x1="16.95" y1="7.05" x2="19.07" y2="4.93"/>
                        </svg>
                        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" aria-hidden="true">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="section section--alt" id="contact" style="padding-top: calc(var(--header-height) + var(--spacing-12));">
            <div class="container">
                <h2 class="section__title">Contact Me</h2>
                <p class="section__subtitle">Have a question or just want to connect?</p>
                <div class="profile__contact">
                    <form class="contact-form" id="contact-form">
                        <div class="contact-form__group">
                            <input type="text" id="contact-name" class="contact-form__input" placeholder="Your Name" required>
                        </div>
                        <div class="contact-form__group">
                            <input type="email" id="contact-email" class="contact-form__input" placeholder="Your Email" required>
                        </div>
                        <div class="contact-form__group">
                            <textarea id="contact-message" class="contact-form__input contact-form__input--textarea" rows="5" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit" class="contact-form__submit">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Shreyas Bishnu</p>
            <nav class="footer__links">
                <a href="mailto:shreyasvishnu@yahoo.com">Email</a>
            </nav>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
